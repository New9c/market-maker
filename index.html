<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Market Maker</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="left-panel">
        <header class="app-header">
            <h1>Market Maker</h1>
        </header>

        <form class="input-panel" id="generator-form">
            <div class="form-grid">
                <label class="dcard">
                    dcardMode
                    <select id="dcardMode">
                        <option value="organic_community">organic_community</option>
                        <option value="official_ad">official_ad</option>
                    </select>
                </label>
                <label>
                    promotionTarget
                    <input type="text" id="promotionTarget" placeholder="promotionTarget" required />
                </label>
                <label>
                    targetAudience
                    <input type="text" id="targetAudience" placeholder="targetAudience" required />
                </label>
                <label>
                    promotionStart
                    <input type="text" id="promotionStart" placeholder="promotionStart" required />
                </label>
                <label>
                    promotionEnd
                    <input type="text" id="promotionEnd" placeholder="promotionEnd" required />
                </label>
                <label>
                    eventDateTimeLocation
                    <input type="text" id="eventDateTimeLocation" placeholder="eventDateTimeLocation" required />
                </label>
                <label>
                    keySellingPoints
                    <input type="text" id="keySellingPoints" placeholder="keySellingPoints" required />
                </label>
                <label>
                    eventFlow
                    <input type="text" id="eventFlow" placeholder="eventFlow" required />
                </label>
                <label>
                    imageBrief(Optional)
                    <input type="text" id="imageBrief" placeholder="imageBrief" />
                </label>
                <label>
                    registrationUrl
                    <input type="text" id="registrationUrl" placeholder="registrationUrl" required />
                </label>
                <label>
                    brandVoice
                    <input type="text" id="brandVoice" placeholder="brandVoice" required />
                </label>
                <label class="threads">
                    threadsTopicTag
                    <input type="text" id="threadsTopicTag" placeholder="threadsTopicTag" />
                </label>
                <label>
                    priceOffer
                    <input type="text" id="priceOffer" placeholder="priceOffer" required />
                </label>
                <label>
                    quotaDeadline
                    <input type="text" id="quotaDeadline" placeholder="quotaDeadline" required />
                </label>
                <label class="line">
                    lineGroupType
                    <select id="lineGroupType">
                        <option value="close_friends">close_friends</option>
                        <option value="alumni">alumni</option>
                        <option value="work_group">work_group</option>
                        <option value="community">community</option>
                    </select>
                </label>
                <label class="dcard">
                    isCommercialEvent
                    <select id="isCommercialEvent">
                        <option value="true">true</option>
                        <option value="false">false</option>
                    </select>
                </label>
                <label class="instagram">
                    instagramPostType
                    <select id="instagramPostType">
                        <option value="feed_caption">feed_caption</option>
                        <option value="reels_caption">reels_caption</option>
                        <option value="carousel">carousel</option>
                    </select>
                </label>
                <label>
                    extraConstraints
                    <input type="text" id="extraConstraints" placeholder="extraConstraints" />
                </label>
                <div class="input-actions" id="platform-checkboxes"></div>
            </div>
            <div class="submit-row">
                <button class="primary" type="submit" id="generate-btn">
                    <span class="btn-text">Generate Post</span>
                    <span class="btn-loader"></span>
                </button>
            </div>
        </form>
    </div>

    <section class="preview-panel">
        <nav class="platform-tabs" id="platform-tabs"></nav>
        <div id="preview-container">
            <p class="preview-text" id="preview-text">
                Your generated post will appear here...
            </p>
        </div>
    </section>

    <script src="main.js"> </script>
</body>

</html>
