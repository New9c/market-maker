<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8" />
    <title>Market Maker</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" type="text/css"
        href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/regular/style.css" />
    <link rel="stylesheet" type="text/css"
        href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/fill/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="left-panel">
        <header class="app-header">
            <h1>宣傳幫手</h1>
            <div id="icon-container">
                <i id="groq-key" class="ph ph-key"></i>
                <a id="github-link" href="https://github.com/New9c/market-maker" target="_blank"
                    rel="noopener noreferrer">
                    <i class="ph ph-github-logo"></i>
                </a>
            </div>
        </header>

        <form class="input-panel" id="generator-form">
            <div class="form-grid">
                <label>
                    宣傳標的：
                    <input type="text" id="promotionTarget" required />
                </label>
                <label>
                    目標對象：
                    <input type="text" id="targetAudience" required />
                </label>
                <label>
                    宣傳開始：
                    <input type="text" id="promotionStart" required />
                </label>
                <label>
                    宣傳結束：
                    <input type="text" id="promotionEnd" required />
                </label>
                <label class="dcard">
                    Dcard發文類型：
                    <select id="dcardMode">
                        <option value="organic_community">一般貼文</option>
                        <option value="official_ad">廣告</option>
                    </select>
                </label>
                <label>
                    活動日期與地點：
                    <input type="text" id="eventDateTimeLocation" required />
                </label>
                <label>
                    主要賣點：
                    <input type="text" id="keySellingPoints" required />
                </label>
                <label>
                    活動流程/時間：
                    <input type="text" id="eventFlow" required />
                </label>
                <label>
                    圖片說明：(非必須)
                    <input type="text" id="imageBrief" />
                </label>
                <label>
                    報名/購買連結：
                    <input type="text" id="registrationUrl" required />
                </label>
                <label class="email">
                    退訂連結：
                    <input type="text" id="unsubscribeUrl" />
                </label>
                <label>
                    品牌語調：
                    <input type="text" id="brandVoice" required />
                </label>
                <label class="threads">
                    Threads標籤：
                    <input type="text" id="threadsTopicTag" />
                </label>
                <label>
                    價格/優惠：
                    <input type="text" id="priceOffer" required />
                </label>
                <label>
                    名額/截止資訊：
                    <input type="text" id="quotaDeadline" required />
                </label>
                <label class="line">
                    群組屬性：
                    <select id="lineGroupType">
                        <option value="close_friends">朋友群</option>
                        <option value="alumni">校友群</option>
                        <option value="work_group">工作群</option>
                        <option value="community">LINE社群</option>
                    </select>
                </label>
                <label class="dcard">
                    是否屬商業／售票活動：
                    <select id="isCommercialEvent">
                        <option value="true">是</option>
                        <option value="false">否</option>
                    </select>
                </label>
                <label class="instagram">
                    發文類型：
                    <select id="instagramPostType">
                        <option value="feed_caption">動態貼文</option>
                        <option value="reels_caption">Reels貼文</option>
                        <option value="carousel">輪播貼文</option>
                    </select>
                </label>
                <label>
                    其他限制：
                    <input type="text" id="extraConstraints" />
                </label>
                <div class="input-actions" id="platform-checkboxes"></div>
            </div>
            <div class="submit-row">
                <button class="primary" type="submit" id="generate-btn">
                    <span class="btn-text">開始製作</span>
                    <span class="btn-loader"></span>
                </button>
            </div>
        </form>
    </div>

    <section class="preview-panel">
        <nav class="platform-tabs" id="platform-tabs"></nav>
        <div id="preview-container">
            <p class="preview-text" id="preview-text">
            </p>
        </div>
    </section>

    <script src="main.js"> </script>
</body>

</html>
