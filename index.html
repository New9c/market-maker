<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Market Maker</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="left-panel">
        <header class="app-header">
            <h1>Market Maker</h1>
        </header>

        <form class="input-panel" id="generator-form">
            <div class="form-grid">
                <label>
                    promotionTarget
                    <input type="text" id="promotionTarget" placeholder="promotionTarget" required />
                </label>
                <label>
                    targetAudience
                    <input type="text" id="targetAudience" placeholder="targetAudience" required />
                </label>
                <label>
                    promotionStart
                    <input type="text" id="promotionStart" placeholder="promotionStart" required />
                </label>
                <label>
                    promotionEnd
                    <input type="text" id="promotionEnd" placeholder="promotionEnd" required />
                </label>
                <label>
                    eventDateTimeLocation
                    <input type="text" id="eventDateTimeLocation" placeholder="eventDateTimeLocation" required />
                </label>
                <label>
                    registrationUrl
                    <input type="text" id="registrationUrl" placeholder="registrationUrl" required />
                </label>
                <label>
                    brandVoice
                    <input type="text" id="brandVoice" placeholder="brandVoice" required />
                </label>
                <label>
                    priceOffer
                    <input type="text" id="priceOffer" placeholder="priceOffer" required />
                </label>
                <label>
                    quotaDeadline
                    <input type="text" id="quotaDeadline" placeholder="quotaDeadline" required />
                </label>
                <label>
                    extraConstraints
                    <input type="text" id="extraConstraints" placeholder="extraConstraints" />
                </label>
                <div class="input-actions" id="platform-checkboxes"></div>
            </div>
            <div class="submit-row">
                <button class="primary" type="submit" id="generate-btn">
                    <span class="btn-text">Generate Post</span>
                    <span class="btn-loader"></span>
                </button>
            </div>
        </form>
    </div>

    <section class="preview-panel">
        <nav class="platform-tabs" id="platform-tabs"></nav>
        <div id="preview-container">
            <p class="preview-text" id="preview-text">
                Your generated post will appear here...
            </p>
        </div>
    </section>

    <script src="main.js"> </script>
</body>

</html>
