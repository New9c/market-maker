<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Market Maker</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap"
        rel="stylesheet">
</head>

<body>
    <main class="app-shell">
        <header class="app-header">
            <p class="tag">Great for small teams</p>
            <h1>Market Maker</h1>
            <p class="lead">
                Feed in your business detail, goal, and tone to get a nice marketing post!
            </p>
        </header>

        <section class="content-grid">
            <form class="input-panel" id="generator-form">
                <h2>Essentials</h2>
                <label>
                    Business name
                    <input type="text" id="businessName" placeholder="Blossom Coffee Shop" required />
                </label>
                <label>
                    Campaign goal
                    <input type="text" id="goal" placeholder="Drive weekend walk-ins" required />
                </label>
                <label>
                    Offer or news
                    <textarea id="offer" rows="3" placeholder="New seasonal drinks, 15% off on Saturdays"></textarea>
                </label>
                <label>
                    Desired tone
                    <select id="tone">
                        <option>Friendly</option>
                        <option>Professional</option>
                        <option>Edgy</option>
                        <option>Witty</option>
                        <option>Inspiring</option>
                    </select>
                </label>
                <label>
                    Model
                    <select id="model">
                        <option value="openai/gpt-oss-120b">Gpt OSS 120B</option>
                        <option value="openai/gpt-oss-20b">Gpt OSS 20B</option>
                        <option value="meta-llama/llama-4-scout-17b-16e-instruct">Llama 4 Scout</option>
                        <option value="meta-llama/llama-4-lite-17b-16e-instruct">Llama 4 Lite</option>
                        <option value="llama-3.3-70b-versatile">Llama 3.3 Versatile</option>
                        <option value="llama-3.1-8b-instant">Llama 3.1 Instant</option>
                        <option value="mixtral-8x7b-32768">Mixtral 8x7B</option>
                        <option value="groq/compound">Groq Compound</option>
                        <option value="groq/compound-mini">Groq Compound Mini</option>
                        <!--
groq/compound-mini
canopylabs/orpheus-v1-english
moonshotai/kimi-k2-instruct-0905
canopylabs/orpheus-arabic-saudi
meta-llama/llama-prompt-guard-2-86m
openai/gpt-oss-120b
openai/gpt-oss-20b
whisper-large-v3-turbo
llama-3.1-8b-instant
qwen/qwen3-32b
allam-2-7b
openai/gpt-oss-safeguard-20b
llama-3.3-70b-versatile
whisper-large-v3
moonshotai/kimi-k2-instruct
meta-llama/llama-4-scout-17b-16e-instruct
meta-llama/llama-prompt-guard-2-22m
groq/compound
-->
                    </select>
                </label>
                <div class="input-actions">
                    <label class="inline">
                        <input type="checkbox" id="threads" checked /> Threads
                    </label>
                    <label class="inline">
                        <input type="checkbox" id="facebook" checked /> Facebook
                    </label>
                </div>
                <div class="submit-row">
                    <button class="primary" type="submit" id="generate-btn">
                        <span class="btn-text">Generate Post</span>
                        <span class="btn-loader"></span>
                    </button>
                    <span class="hint">Powered by Groq</span>
                </div>
            </form>

            <section class="preview-panel">
                <div class="preview-heading">
                    <h2>Preview</h2>
                    <p class="tag" id="status-tag">Draft text</p>
                </div>
                <div id="preview-container">
                    <article class="preview-card">
                        <div class="card-header">
                            <p class="platform">Threads</p>
                            <button class="copy-btn" onclick="copyToClipboard('threads-preview', this)">Copy</button>
                        </div>
                        <p class="preview-text" id="threads-preview">
                            Your generated Threads post will appear here...
                        </p>
                    </article>
                    <article class="preview-card">
                        <div class="card-header">
                            <p class="platform">Facebook</p>
                            <button class="copy-btn" onclick="copyToClipboard('facebook-preview', this)">Copy</button>
                        </div>
                        <p class="preview-text" id="facebook-preview">
                            Your generated Facebook post will appear here...
                        </p>
                    </article>
                </div>
            </section>
        </section>
    </main>

    <script src="main.js"> </script>
</body>

</html>
